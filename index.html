<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitleMeta">MilAssoc Pro</title>
    <link id="favicon" rel="icon" type="image/png" href="">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/fira-sans@5.0.0/index.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Fira Sans', 'system-ui', 'sans-serif'] } } }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fira Sans', sans-serif;
        }

        .sidebar-overlay {
            display: none;
        }

        @media(max-width:1024px) {
            .sidebar-open {
                transform: translateX(0) !important;
            }

            .sidebar-overlay {
                display: block !important;
            }
        }

        .fade-in {
            animation: fadeIn .3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(.5);
        }

        select option {
            background: var(--bg-card);
            color: var(--text);
        }

        .chat-scroll {
            scroll-behavior: smooth;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }
        }

        .tab-active {
            border-bottom: 2px solid var(--accent) !important;
            color: var(--accent) !important;
        }

        .progress-fill {
            transition: width .8s ease;
        }

        .card-hover {
            transition: all .25s ease;
        }

        .card-hover:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, .3);
        }

        .table-row:hover {
            background: rgba(79, 122, 63, .08);
        }

        .avatar-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .clickable-zone {
            cursor: pointer;
            transition: all .2s;
        }

        .clickable-zone:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .2);
        }

        .copy-btn {
            opacity: 0;
            transition: opacity .2s;
            cursor: pointer;
            font-size: 12px;
        }

        .table-row:hover .copy-btn {
            opacity: 1;
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-wrapper input[type="color"] {
            width: 40px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            padding: 0;
        }

        .color-picker-wrapper input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 2px;
        }

        .color-picker-wrapper input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 4px;
        }

        /* CARTE MEMBRE */
        .member-card-preview {
            width: 595px;
            height: 374px;
            background: linear-gradient(135deg, #e0e4e8 0%, #f0f0f0 25%, #ffffff 50%, #ffe8e0 75%, #e8d8d0 100%);
            border: 2px solid #b0b0b0;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            font-family: 'Georgia', serif;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .15);
        }

        .member-card-preview .card-header {
            display: flex;
            align-items: flex-start;
            padding: 10px 16px 6px;
            gap: 12px;
        }

        .member-card-preview .card-logo {
            width: 60px;
            height: 60px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .member-card-preview .card-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .member-card-preview .card-org-block {
            flex: 1;
            text-align: left;
            padding-top: 2px;
        }

        .member-card-preview .card-org-name {
            font-size: 18px;
            font-weight: bold;
            color: #c0392b;
            line-height: 1.2;
            letter-spacing: 0.5px;
        }

        .member-card-preview .card-org-addr {
            font-size: 10px;
            color: #4a4a6a;
            margin-top: 2px;
        }

        .member-card-preview .card-org-decret {
            font-size: 8px;
            color: #777;
            font-style: italic;
            margin-top: 1px;
        }

        .member-card-preview .card-type-line {
            text-align: center;
            padding: 6px 0 4px;
            border-bottom: 1px solid #ccc;
            margin: 0 16px;
        }

        .member-card-preview .card-type {
            font-size: 17px;
            font-style: italic;
            color: #2c2c2c;
        }

        .member-card-preview .card-number {
            font-size: 13px;
            font-style: normal;
            color: #555;
        }

        .member-card-preview .card-fields {
            padding: 6px 16px;
        }

        .member-card-preview .card-field {
            display: flex;
            align-items: baseline;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .member-card-preview .card-field label {
            font-size: 10px;
            color: #666;
            min-width: 90px;
            flex-shrink: 0;
        }

        .member-card-preview .card-field .value {
            font-size: 16px;
            font-weight: bold;
            color: #1a1a1a;
            border-bottom: 1px dotted #999;
            flex: 1;
            padding: 0 6px;
            min-height: 22px;
        }

        .member-card-preview .card-section {
            padding: 2px 16px;
        }

        .member-card-preview .card-section .section-label {
            font-size: 10px;
            color: #666;
            font-weight: normal;
        }

        .member-card-preview .card-section .section-value {
            font-size: 14px;
            font-weight: bold;
            color: #1a1a1a;
        }

        .member-card-preview .card-footer {
            display: flex;
            justify-content: space-around;
            padding: 6px 12px 8px;
            margin-top: 4px;
        }

        .member-card-preview .card-signature {
            text-align: center;
            flex: 1;
        }

        .member-card-preview .card-signature .sig-img {
            width: 80px;
            height: 32px;
            margin: 0 auto 2px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
        }

        .member-card-preview .card-signature .sig-img img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .member-card-preview .card-signature .sig-line {
            font-size: 14px;
            font-style: italic;
            color: #333;
            min-height: 20px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-family: 'Brush Script MT', cursive;
        }

        .member-card-preview .card-signature .sig-label {
            font-size: 7px;
            color: #888;
        }

        /* CALENDRIER */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .calendar-day-header {
            text-align: center;
            font-weight: 600;
            font-size: 12px;
            padding: 8px 4px;
            color: var(--text-dim);
        }

        .calendar-day {
            min-height: 80px;
            padding: 4px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 11px;
        }

        .calendar-day.today {
            border-color: var(--accent);
            background: rgba(79, 122, 63, .1);
        }

        .calendar-day.other-month {
            opacity: .4;
        }

        .calendar-day-number {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 2px;
        }

        .calendar-event {
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 3px;
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media print {
            body * {
                visibility: hidden;
            }

            .print-area,
            .print-area * {
                visibility: visible;
            }

            .print-area {
                position: absolute;
                left: 0;
                top: 0;
            }

            .no-print {
                display: none !important;
            }
        }

        .sig-upload-area {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: border-color .2s;
        }

        .sig-upload-area:hover {
            border-color: var(--accent);
        }

        .sig-preview {
            width: 100px;
            height: 36px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sig-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .view-toggle {
            display: flex;
            gap: 4px;
        }

        .view-toggle button {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-dim);
            transition: all .2s;
        }

        .view-toggle button.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Notification badge */
        .notif-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 9999px;
            font-weight: bold;
            min-width: 18px;
            text-align: center;
        }
    </style>
</head>

<body id="appBody">

    <!-- LOGIN -->
    <div id="loginScreen"
        style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;background:linear-gradient(135deg,#1a2a1a,#0f1a0f);">
        <div style="width:100%;max-width:400px;">
            <div
                style="background:#1a2a1a;border:1px solid #2d402d;border-radius:20px;padding:40px 32px;text-align:center;">
                <div id="loginLogoContainer"
                    style="width:72px;height:72px;border-radius:16px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#4f7a3f;">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M12 2L2 7v10l10 5 10-5V7L12 2z" />
                        <path d="M12 22V12" />
                        <path d="M22 7L12 12 2 7" />
                    </svg>
                </div>
                <h1 id="loginAppTitle" style="font-size:26px;font-weight:700;margin-bottom:4px;color:#e0e8d8;">MilAssoc
                    Pro</h1>
                <p style="font-size:14px;margin-bottom:32px;color:#8a9a80;">Gestion d'Association Militaire</p>
                <form id="loginForm" autocomplete="off">
                    <div style="text-align:left;margin-bottom:16px;"><label
                            style="display:block;font-size:13px;margin-bottom:6px;color:#8a9a80;">Email</label><input
                            type="email" id="loginEmail" required placeholder="votre@email.fr"
                            style="width:100%;border-radius:10px;padding:12px 16px;font-size:14px;outline:none;background:#243524;border:1px solid #2d402d;color:#e0e8d8;">
                    </div>
                    <div style="text-align:left;margin-bottom:20px;"><label
                            style="display:block;font-size:13px;margin-bottom:6px;color:#8a9a80;">Mot de
                            passe</label><input type="password" id="loginPass" required placeholder="••••••••"
                            style="width:100%;border-radius:10px;padding:12px 16px;font-size:14px;outline:none;background:#243524;border:1px solid #2d402d;color:#e0e8d8;">
                    </div>
                    <div id="loginError"
                        style="display:none;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#ef4444;text-align:left;">
                    </div>
                    <button type="submit" id="loginBtn"
                        style="width:100%;padding:14px;border-radius:10px;font-size:16px;font-weight:600;color:white;background:#4f7a3f;border:none;cursor:pointer;">Se
                        connecter</button>
                </form>
                <button id="resetBtn"
                    style="margin-top:16px;font-size:11px;color:#5a6a50;background:none;border:none;cursor:pointer;text-decoration:underline;">Réinitialiser
                    les données</button>
            </div>
        </div>
    </div>

    <!-- APP SHELL -->
    <div id="appShell" style="display:none;">
        <div id="sidebarOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;"
            onclick="App.closeSidebar()"></div>
        <aside id="sidebar"
            style="position:fixed;left:0;top:0;height:100%;width:256px;z-index:50;display:flex;flex-direction:column;transition:transform .3s;background:var(--bg-card);border-right:1px solid var(--border);">
            <div style="padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;">
                <div style="display:flex;align-items:center;gap:12px;">
                    <div id="sidebarLogo"
                        style="width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--accent);overflow:hidden;">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                            <path d="M12 2L2 7v10l10 5 10-5V7L12 2z" />
                            <path d="M12 22V12" />
                            <path d="M22 7L12 12 2 7" />
                        </svg>
                    </div>
                    <div style="min-width:0;">
                        <h1 style="font-size:18px;font-weight:700;letter-spacing:.5px;color:var(--accent-light);"
                            id="appTitle">MILASSOC</h1>
                        <p style="font-size:11px;letter-spacing:1px;color:var(--text-dim);">PRO v5.3</p>
                    </div>
                </div>
            </div>
            <nav style="flex:1;overflow-y:auto;padding:12px 8px;" id="sidebarNav"></nav>
            <div style="padding:16px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg-card);">
                <div style="display:flex;align-items:center;gap:12px;">
                    <div id="userAvatar"
                        style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;background:var(--accent);color:white;overflow:hidden;">
                        CL</div>
                    <div style="flex:1;min-width:0;">
                        <p style="font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                            id="userName">Cdt. Lefebvre</p>
                        <p style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-dim);"
                            id="userRole">Administrateur</p>
                    </div>
                    <button onclick="App.handleLogout()"
                        style="padding:6px;border-radius:6px;background:none;border:none;cursor:pointer;color:var(--text-dim);"
                        title="Déconnexion"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg></button>
                </div>
            </div>
        </aside>
        <main style="margin-left:256px;min-height:100vh;display:flex;flex-direction:column;" id="mainContent">
            <header
                style="position:sticky;top:0;z-index:30;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg-dark);border-bottom:1px solid var(--border);">
                <div style="display:flex;align-items:center;gap:12px;">
                    <button onclick="App.toggleSidebar()"
                        style="display:none;padding:6px;border-radius:6px;background:none;border:none;cursor:pointer;color:var(--text-dim);"
                        id="menuBtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="3" y1="6" x2="21" y2="6" />
                            <line x1="3" y1="12" x2="21" y2="12" />
                            <line x1="3" y1="18" x2="21" y2="18" />
                        </svg></button>
                    <div id="headerLogo"
                        style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--accent);overflow:hidden;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                            <path d="M12 2L2 7v10l10 5 10-5V7L12 2z" />
                            <path d="M12 22V12" />
                            <path d="M22 7L12 12 2 7" />
                        </svg>
                    </div>
                    <h2 style="font-size:18px;font-weight:600;color:var(--text);" id="pageTitle">Tableau de Bord</h2>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <div style="position:relative;display:none;" id="searchWrap"><input type="text"
                            placeholder="Rechercher..."
                            style="border-radius:8px;padding:8px 12px 8px 36px;font-size:13px;outline:none;width:200px;background:var(--bg-input);border:1px solid var(--border);color:var(--text);"
                            id="globalSearch"><svg
                            style="position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;"
                            width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)"
                            stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg></div>
                    <button onclick="App.toggleNotifPanel()"
                        style="position:relative;padding:6px;background:none;border:none;cursor:pointer;color:var(--text-dim);"
                        id="notifBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                        </svg>
                        <span class="notif-badge pulse" id="notifBadge" style="display:none;">0</span>
                    </button>
                    <button onclick="App.openQuickAction()"
                        style="padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:white;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;"><svg
                            width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg><span id="qaLabel">Action rapide</span></button>
                </div>
            </header>

            <!-- Notification Panel -->
            <div id="notifPanel"
                style="position:fixed;right:16px;top:56px;z-index:50;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.3);width:320px;max-height:384px;overflow-y:auto;display:none;background:var(--bg-card);border:1px solid var(--border);">
                <div
                    style="padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg-card);">
                    <h4 style="font-weight:600;color:var(--text);">Notifications</h4><button onclick="App.clearNotifs()"
                        style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;">Tout
                        marquer lu</button>
                </div>
                <div id="notifList"></div>
            </div>

            <div style="flex:1;padding:16px 24px;overflow-y:auto;" id="contentArea"></div>
        </main>
    </div>

    <!-- Toast -->
    <div id="toast"
        style="position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.3);font-size:14px;font-weight:500;z-index:200;display:flex;align-items:center;gap:8px;max-width:320px;color:white;background:var(--accent);transform:translateY(100px);opacity:0;transition:all .3s;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12" />
        </svg>
        <span id="toastMsg"></span>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" style="position:fixed;inset:0;z-index:150;display:none;">
        <div style="position:absolute;inset:0;background:rgba(0,0,0,.6);" onclick="App.closeModal('confirmModal')">
        </div>
        <div
            style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:12px;border:1px solid var(--border);width:100%;max-width:380px;margin:0 16px;padding:24px;background:var(--bg-card);">
            <div style="text-align:center;">
                <div
                    style="width:56px;height:56px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;background:rgba(239,68,68,.2);">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="15" y1="9" x2="9" y2="15" />
                        <line x1="9" y1="9" x2="15" y2="15" />
                    </svg>
                </div>
                <h3 style="font-size:18px;font-weight:600;margin-bottom:8px;color:var(--text);" id="cfmTitle">Confirmer
                </h3>
                <p style="font-size:14px;margin-bottom:24px;color:var(--text-dim);" id="cfmMsg"></p>
                <div style="display:flex;gap:12px;justify-content:center;">

            checkAuth: function () {
                try {
                    var session = sessionStorage.getItem('milassoc_session');
                    if (session) {
                        var user = JSON.parse(session);
                        var users = DB.getUsers();
                        var found = users.find(function (u) { return u.id === user.id && u.email === user.email; });
                        if (found) { this.currentUser = found; this.showApp(); return; }
                    }
                } catch (e) { }
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('appShell').style.display = 'none';
            },

            handleLogin: function (e) {
                e.preventDefault();
                var email = document.getElementById('loginEmail').value.trim();
                var pass = document.getElementById('loginPass').value;
                var errEl = document.getElementById('loginError');
                if (!email || !pass) { errEl.style.display = 'block'; errEl.textContent = 'Veuillez remplir tous les champs.'; return; }
                var users = DB.getUsers();
                var user = null;
                for (var i = 0; i < users.length; i++) { if (users[i].email === email && users[i].pass === pass) { user = users[i]; break; } }
                if (user) {
                    this.currentUser = user;
                    sessionStorage.setItem('milassoc_session', JSON.stringify({ id: user.id, email: user.email }));
                    errEl.style.display = 'none';
                    this.showApp();
                } else {
                    errEl.style.display = 'block'; errEl.textContent = 'Identifiants incorrects.';
                    document.getElementById('loginPass').value = '';
                }
            },

            handleLogout: function () {
                this.currentUser = null;
                sessionStorage.removeItem('milassoc_session');
                document.getElementById('appShell').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPass').value = '';
                document.getElementById('loginError').style.display = 'none';
                var mc = document.getElementById('modalsContainer'); if (mc) mc.innerHTML = '';

                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appShell').style.display = '';

                if (cfg.customColors) { for (var k in cfg.customColors) { t[k] = cfg.customColors[k]; } }

                if (cfg.logo) this.applyLogo(cfg.logo);
                if (cfg.favicon) this.applyFavicon(cfg.favicon);
                var cfg2 = DB.getConfig();

                document.getElementById('userRole').textContent = this.currentUser.role;
                var ini = this.currentUser.name.split(' ').map(function (w) { return w[0]; }).join('').substring(0, 2);

                    avatar.style.background = 'var(--accent)';

            applyThemeObject: function (t) {
                var r = document.getElementById('appBody').style;

                r.setProperty('--text-dim', t.textDim);

            renderCalendar: function () {
                var container = document.getElementById('calendarContainer');
                if (!container) return;

                var dayNames = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
                var year = this.calYear;
                var month = this.calMonth;
                document.getElementById('calTitle').textContent = monthNames[month] + ' ' + year;

                var firstDay = new Date(year, month, 1);
                var lastDay = new Date(year, month + 1, 0);
                var startDay = firstDay.getDay() || 7;
                var today = new Date();
                var todayStr = today.toISOString().split('T')[0];

                var events = DB.getEvents();

                var html = '<div class="calendar-grid">';
                dayNames.forEach(function (d) { html += '<div class="calendar-day-header">' + d + '</div>'; });

                var day = 1 - (startDay - 1);
                var totalDays = 6 * 7;
                for (var i = 0; i < totalDays; i++) {
                    var d = new Date(year, month, day);
                    var dateStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                    var isToday = dateStr === todayStr;
                    var isOtherMonth = d.getMonth() !== month;
                    var dayEvents = events.filter(function (e) { return e.date === dateStr; });

                    html += '<div class="calendar-day' + (isToday ? ' today' : '') + (isOtherMonth ? ' other-month' : '') + '">';
                    html += '<div class="calendar-day-number">' + d.getDate() + '</div>';
                    dayEvents.forEach(function (ev) {
                        var color = ev.type === 'Cérémonie' ? 'background:rgba(202,138,4,.15);color:#d97706;' :
                            ev.type === 'Réunion' ? 'background:rgba(37,99,235,.15);color:#2563eb;' :
                                ev.type === 'Formation' ? 'background:rgba(34,197,94,.15);color:#16a34a;' :
                                    'background:rgba(139,92,246,.15);color:#7c3aed;';
                        html += '<div class="calendar-event" style="' + color + '" title="' + ev.title + ' (' + ev.time + ')">' + ev.title.substring(0, 20) + '</div>';
                    });
                    html += '</div>';
                    day++;
                }
                html += '</div>';
                container.innerHTML = html;
            },

            printCalendar: function () {
                var cfg = DB.getConfig();

                var dayNames = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi', 'Dimanche'];
                var year = this.calYear;
                var month = this.calMonth;
                var events = DB.getEvents();

                var firstDay = new Date(year, month, 1);
                var lastDay = new Date(year, month + 1, 0);
                var startDay = firstDay.getDay() || 7;
                var today = new Date();
                var todayStr = today.toISOString().split('T')[0];

                var html = '<!DOCTYPE html><html><head><title>Calendrier - ' + monthNames[month] + ' ' + year + '</title><style>' +
                    'body{font-family:Georgia,serif;margin:0;padding:20px;color:#000;}' +
                    '.header{text-align:center;margin-bottom:20px;border-bottom:2px solid #c0392b;padding-bottom:12px;}' +
                    '.header h1{font-size:22px;color:#c0392b;margin:0;}' +
                    '.header h2{font-size:16px;margin:8px 0 4px;color:#333;}' +
                    'table{border-collapse:collapse;width:100%;}' +
                    'th,td{border:1px solid #333;padding:4px 8px;font-size:11px;vertical-align:top;height:60px;}' +
                    'th{background:#f0f0f0;font-weight:bold;text-align:center;height:auto;}' +
                    '.today{background:#fff3cd;}' +
                    '.event{font-size:10px;padding:1px 3px;border-radius:2px;margin:1px 0;}' +

                html += '<div class="header"><h1>' + (cfg.cardOrgName || this.getAssociationName()) + '</h1><h2>Calendrier - ' + monthNames[month] + ' ' + year + '</h2></div>';
                html += '<table><thead><tr>';
                dayNames.forEach(function (d) { html += '<th>' + d + '</th>'; });
                html += '</tr></thead><tbody>';

                var day = 1 - (startDay - 1);
                var weeks = Math.ceil((lastDay.getDate() + startDay - 1) / 7);
                for (var w = 0; w < weeks; w++) {
                    html += '<tr>';
                    for (var d = 0; d < 7; d++) {
                        var date = new Date(year, month, day);
                        var dateStr = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
                        var isToday = dateStr === todayStr;
                        var isOtherMonth = date.getMonth() !== month;
                        var dayEvents = events.filter(function (e) { return e.date === dateStr; });

                        html += '<td class="' + (isToday ? 'today' : '') + (isOtherMonth ? ' style="opacity:.4;"' : '') + '">';

                            html += '<div class="event" style="background:#e3f2fd;color:#1565c0;">' + ev.time + ' ' + ev.title + '</div>';
                        });
                        html += '</td>';
                        day++;

                    html += '</tr>';
                }
                html += '</tbody></table></body></html>';

                var win = window.open('', '', 'width=900,height=700');

                setTimeout(function () { win.print(); }, 500);

            previewCardSig: function (input, previewId, configKey) {
                if (input.files && input.files[0]) {
                    var reader = new FileReader();
                    reader.onload = function (e) {
                        document.getElementById(previewId).innerHTML = '<img src="' + e.target.result + '" style="max-width:100%;max-height:100%;">';
                        var cfg = DB.getConfig();
                        cfg[configKey] = e.target.result;
                        DB.setConfig(cfg);
                    };
                    reader.readAsDataURL(input.files[0]);
                }
            },

                    save();

            },

            handleManagerSave: function (e) {
                e.preventDefault();
                var eid = document.getElementById('mgrEditId').value;
                var photoFile = document.getElementById('mgrfPhoto');
                var sigNatFile = document.getElementById('mgrSigNat');
                var sigDepFile = document.getElementById('mgrSigDep');
                var sigSecFile = document.getElementById('mgrSigSec');
                var self = this;
                var sigNatData = null, sigDepData = null, sigSecData = null;
                var processSave = function (photoData) {
                    var d = { first: document.getElementById('mgrfFirst').value.trim(), last: document.getElementById('mgrfLast').value.trim(), email: document.getElementById('mgrfEmail').value.trim(), phone: document.getElementById('mgrfPhone') ? document.getElementById('mgrfPhone').value.trim() : '', role: document.getElementById('mgrfRole').value, status: document.getElementById('mgrfStatus').value, photo: photoData, sigNat: sigNatData, sigDep: sigDepData, sigSec: sigSecData };
                    var mgrs = DB.getManagers();
                    if (eid) { for (var i = 0; i < mgrs.length; i++) { if (mgrs[i].id === parseInt(eid)) { for (var k in d) { if (d[k] !== null && d[k] !== undefined) mgrs[i][k] = d[k]; } break; } } DB.setManagers(mgrs); App.showToast(d.first + ' ' + d.last + ' modifié'); }
                    else { var mx = 0; for (var i = 0; i < mgrs.length; i++) { if (mgrs[i].id > mx) mx = mgrs[i].id; } d.id = mx + 1; mgrs.push(d); DB.setManagers(mgrs); App.showToast(d.first + ' ' + d.last + ' ajouté'); }
                    App.closeAllModals(); App.renderAdminManagers();
                };
                var sigCount = 0;
                var checkDone = function () {
                    sigCount++;
                    if (sigCount >= 3) {
                        if (photoFile && photoFile.files && photoFile.files[0]) {
                            var reader = new FileReader();
                            reader.onload = function (ev) { processSave(ev.target.result); };
                            reader.readAsDataURL(photoFile.files[0]);
                        } else {
                            if (eid) { var old = DB.getManagers().find(function (x) { return x.id === parseInt(eid); }); processSave(old ? old.photo : null); }
                            else processSave(null);
                        }
                    }
                };
                if (sigNatFile && sigNatFile.files && sigNatFile.files[0]) {
                    var r1 = new FileReader(); r1.onload = function (ev) { sigNatData = ev.target.result; checkDone(); }; r1.readAsDataURL(sigNatFile.files[0]);
                } else { sigNatData = eid ? (DB.getManagers().find(function (x) { return x.id === parseInt(eid); }) || {}).sigNat : null; checkDone(); }
                if (sigDepFile && sigDepFile.files && sigDepFile.files[0]) {
                    var r2 = new FileReader(); r2.onload = function (ev) { sigDepData = ev.target.result; checkDone(); }; r2.readAsDataURL(sigDepFile.files[0]);
                } else { sigDepData = eid ? (DB.getManagers().find(function (x) { return x.id === parseInt(eid); }) || {}).sigDep : null; checkDone(); }
                if (sigSecFile && sigSecFile.files && sigSecFile.files[0]) {
                    var r3 = new FileReader(); r3.onload = function (ev) { sigSecData = ev.target.result; checkDone(); }; r3.readAsDataURL(sigSecFile.files[0]);
                } else { sigSecData = eid ? (DB.getManagers().find(function (x) { return x.id === parseInt(eid); }) || {}).sigSec : null; checkDone(); }
            },

                var m = DB.getManagers().find(function (x) { return x.id === id; }); if (!m) return;

                    '<div style="display:flex;flex-direction:column;gap:20px;">' +
                    '<div><label style="display:block;font-size:14px;margin-bottom:12px;color:var(--text-dim);">Thème prédéfini</label><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;">' +
                    Object.keys(this.THEMES).map(function (key) {

                    }).join('') +

                    '<div><label style="display:block;font-size:14px;margin-bottom:12px;color:var(--text-dim);">Couleurs personnalisées</label>' +

                    '<div class="color-picker-wrapper"><label style="font-size:13px;color:var(--text-dim);min-width:100px;">Fond principal</label><input type="color" id="customBgDark" value="' + (customColors.bgDark || cfg.bgDark || '#0f1a0f') + '" onchange="App.updateCustomColor(\'bgDark\',this.value)"></div>' +
                    '<div class="color-picker-wrapper"><label style="font-size:13px;color:var(--text-dim);min-width:100px;">Fond carte</label><input type="color" id="customBgCard" value="' + (customColors.bgCard || '#1a2a1a') + '" onchange="App.updateCustomColor(\'bgCard\',this.value)"></div>' +
                    '<div class="color-picker-wrapper"><label style="font-size:13px;color:var(--text-dim);min-width:100px;">Couleur accent</label><input type="color" id="customAccent" value="' + (customColors.accent || '#4f7a3f') + '" onchange="App.updateCustomColor(\'accent\',this.value)"></div>' +
                    '<div class="color-picker-wrapper"><label style="font-size:13px;color:var(--text-dim);min-width:100px;">Accent clair</label><input type="color" id="customAccentLight" value="' + (customColors.accentLight || '#6b9e55') + '" onchange="App.updateCustomColor(\'accentLight\',this.value)"></div>' +
                    '<div class="color-picker-wrapper"><label style="font-size:13px;color:var(--text-dim);min-width:100px;">Texte</label><input type="color" id="customText" value="' + (customColors.text || '#e0e8d8') + '" onchange="App.updateCustomColor(\'text\',this.value)"></div>' +
                    '<div class="color-picker-wrapper"><label style="font-size:13px;color:var(--text-dim);min-width:100px;">Texte dim</label><input type="color" id="customTextDim" value="' + (customColors.textDim || '#8a9a80') + '" onchange="App.updateCustomColor(\'textDim\',this.value)"></div>' +
                    '<div class="color-picker-wrapper"><label style="font-size:13px;color:var(--text-dim);min-width:100px;">Bordure</label><input type="color" id="customBorder" value="' + (customColors.border || '#2d402d') + '" onchange="App.updateCustomColor(\'border\',this.value)"></div>' +
                    '<div class="color-picker-wrapper"><label style="font-size:13px;color:var(--text-dim);min-width:100px;">Fond input</label><input type="color" id="customBgInput" value="' + (customColors.bgInput || '#243524') + '" onchange="App.updateCustomColor(\'bgInput\',this.value)"></div>' +
                    '</div>' +
                    '<button onclick="App.applyTheme(\'custom\')" style="padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:white;background:var(--accent);border:none;cursor:pointer;margin-top:8px;">Appliquer couleurs personnalisées</button>' +
                    '</div>' +
                    '<div><label style="display:block;font-size:14px;margin-bottom:12px;color:var(--text-dim);">Logo du site</label><div style="display:flex;align-items:center;gap:16px;">' +
                    '<div style="width:64px;height:64px;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg-input);border:1px solid var(--border);">' + (cfg.logo ? '<img src="' + cfg.logo + '" style="width:100%;height:100%;object-fit:cover;">' : '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="2"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/></svg>') + '</div>' +
                    '<div><label style="display:inline-block;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;color:white;background:var(--accent);cursor:pointer;" for="logoUpload">Choisir</label><input type="file" id="logoUpload" accept="image/*" style="display:none;" onchange="App.handleLogoUpload(this)"><p style="font-size:12px;margin-top:4px;color:var(--text-dim);">PNG, JPG — Max 2MB</p>' + (cfg.logo ? '<button onclick="App.removeLogo()" style="font-size:12px;margin-top:8px;color:var(--danger);background:none;border:none;cursor:pointer;">Supprimer</button>' : '') + '</div></div></div>' +
                    '<div><label style="display:block;font-size:14px;margin-bottom:12px;color:var(--text-dim);">Favicon</label><div style="display:flex;align-items:center;gap:16px;">' +
                    '<div style="width:32px;height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg-input);border:1px solid var(--border);">' + (cfg.favicon ? '<img src="' + cfg.favicon + '" style="width:100%;height:100%;object-fit:cover;">' : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="2"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/></svg>') + '</div>' +
                    '<div><label style="display:inline-block;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:white;background:var(--accent);cursor:pointer;" for="faviconUpload">Choisir</label><input type="file" id="faviconUpload" accept="image/*" style="display:none;" onchange="App.handleFaviconUpload(this)"><p style="font-size:12px;margin-top:4px;color:var(--text-dim);">PNG, ICO — 32×32 recommandé</p>' + (cfg.favicon ? '<button onclick="App.removeFavicon()" style="font-size:12px;margin-top:8px;color:var(--danger);background:none;border:none;cursor:pointer;">Supprimer</button>' : '') + '</div></div></div>' +
                    '<div><label style="display:block;font-size:14px;margin-bottom:12px;color:var(--text-dim);">Couleur de fond du logo</label><div class="color-picker-wrapper"><input type="color" id="logoBgColor" value="' + (cfg.logoBg || '#4f7a3f') + '" onchange="App.updateLogoBg(this.value)"><span style="font-size:13px;color:var(--text-dim);">Utilisé quand aucun logo n\'est défini</span></div></div>' +
                    '</div></div>' +
                    '<div style="border-radius:12px;border:1px solid var(--border);padding:24px;background:var(--bg-card);"><h3 style="font-size:18px;font-weight:600;margin-bottom:20px;">Données</h3><div style="display:flex;flex-wrap:wrap;gap:12px;">' +
                    '<button onclick="App.exportAllData()" style="padding:10px 16px;border-radius:8px;font-size:14px;background:var(--bg-input);color:var(--text);border:1px solid var(--border);cursor:pointer;">Exporter JSON</button>' +
                    '<button onclick="App.importAllData()" style="padding:10px 16px;border-radius:8px;font-size:14px;background:var(--bg-input);color:var(--text);border:1px solid var(--border);cursor:pointer;">Importer JSON</button>' +
                    '<button onclick="App.clearAllData()" style="padding:10px 16px;border-radius:8px;font-size:14px;background:rgba(239,68,68,.2);color:#ef4444;border:1px solid rgba(239,68,68,.3);cursor:pointer;">Réinitialiser</button>' +

            saveSettings: function () {
                var cfg = DB.getConfig();
                var nameEl = document.getElementById('settName');
                if (nameEl) { cfg.appName = nameEl.value.trim() || 'MILASSOC PRO'; }
                DB.setConfig(cfg);
                document.getElementById('loginAppTitle').textContent = cfg.appName;
                document.getElementById('appTitle').textContent = cfg.appName;
                document.getElementById('pageTitleMeta').textContent = cfg.appName;
                this.showToast('Paramètres sauvegardés');
            },
            handleLogoUpload: function (input) {
                var file = input.files[0]; if (!file) return;
                if (file.size > 2 * 1024 * 1024) { this.showToast('Trop volumineux'); return; }
                var self = this;
                var reader = new FileReader();
                reader.onload = function (e) { self.applyLogo(e.target.result); self.renderSettings(); self.showToast('Logo mis à jour'); };
                reader.readAsDataURL(file);
            },
            removeLogo: function () { this.applyLogo(null); this.renderSettings(); this.showToast('Logo supprimé'); },
            handleFaviconUpload: function (input) {
                var file = input.files[0]; if (!file) return;
                if (file.size > 2 * 1024 * 1024) { this.showToast('Trop volumineux'); return; }
                var self = this;
                var reader = new FileReader();
                reader.onload = function (e) { self.applyFavicon(e.target.result); self.renderSettings(); self.showToast('Favicon mis à jour'); };
                reader.readAsDataURL(file);
            },
            removeFavicon: function () {
                var cfg = DB.getConfig(); cfg.favicon = null; DB.setConfig(cfg);
                document.getElementById('favicon').href = '';
                this.renderSettings(); this.showToast('Favicon supprimé');
            },
            updateCustomColor: function (key, value) {
                var cfg = DB.getConfig();
                if (!cfg.customColors) cfg.customColors = {};
                cfg.customColors[key] = value;
                DB.setConfig(cfg);
            },
            applyTheme: function (key) {
                var t = this.THEMES[key];
                if (!t) return;
                var cfg = DB.getConfig();
                if (key === 'custom' && cfg.customColors) {
                    for (var k in cfg.customColors) { t[k] = cfg.customColors[k]; }
                }
                cfg.theme = key;
                DB.setConfig(cfg);
                this.applyThemeObject(t);
                this.renderSettings();
                this.showToast('Thème "' + t.name + '" appliqué');
            },
            updateLogoBg: function (color) {
                var cfg = DB.getConfig(); cfg.logoBg = color; DB.setConfig(cfg);
                if (!cfg.logo) {
                    var ids = ['sidebarLogo', 'loginLogoContainer', 'headerLogo'];
                    for (var i = 0; i < ids.length; i++) {
                        var el = document.getElementById(ids[i]);
                        if (el) el.style.background = color;
                    }
                }
                this.showToast('Couleur de fond mise à jour');
            },
            exportAllData: function () {
                var data = DB.exportAll();
                var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }), url = URL.createObjectURL(blob), a = document.createElement('a');
                a.href = url; a.download = 'milassoc_' + new Date().toISOString().split('T')[0] + '.json'; a.click(); URL.revokeObjectURL(url);
                this.showToast('Données exportées');
            },
            importAllData: function () {
                var input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
                var self = this;
                input.onchange = function (e) {
                    var file = e.target.files[0]; if (!file) return;
                    var reader = new FileReader();
                    reader.onload = function (ev) {
                        try {
                            var data = JSON.parse(ev.target.result);
                            if (DB.importAll(data)) {
                                self.showToast('Données importées avec succès');
                                location.reload();
                            } else {
                                self.showToast('Erreur: fichier invalide');
                            }
                        } catch (err) { self.showToast('Erreur de lecture du fichier'); }
                    };
                    reader.readAsText(file);
                };
                input.click();
            },

            // ==================== QUICK ACTION ====================
            openQuickAction: function () {
                var cm = this.canEdit(), cf = this.canFinance();
                var h = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">';
                if (cm) h += '<button onclick="App.closeAllModals();App.openAddMember()" style="padding:16px;border-radius:8px;text-align:center;background:var(--bg-input);border:1px solid var(--border);cursor:pointer;color:var(--text);">➕ Membre</button>';
                if (cm) h += '<button onclick="App.closeAllModals();App.openAddEvent()" style="padding:16px;border-radius:8px;text-align:center;background:var(--bg-input);border:1px solid var(--border);cursor:pointer;color:var(--text);">📅 Événement</button>';
                if (cf) h += '<button onclick="App.closeAllModals();App.openAddTx()" style="padding:16px;border-radius:8px;text-align:center;background:var(--bg-input);border:1px solid var(--border);cursor:pointer;color:var(--text);">💰 Transaction</button>';
                h += '<button onclick="App.closeAllModals();App.openUploadDoc()" style="padding:16px;border-radius:8px;text-align:center;background:var(--bg-input);border:1px solid var(--border);cursor:pointer;color:var(--text);">📄 Document</button>';
                h += '</div>';
                this.showGenericModal('Action rapide', h);
            }
        };

        document.addEventListener('DOMContentLoaded', function () {
            App.init();
        });
