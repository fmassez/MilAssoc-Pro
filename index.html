.sidebar-overlay { display: block !important; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
.line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
input[type="date"]::-webkit-calendar-picker-indicator,
input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(.5); }
select option { background: var(--bg-card); color: var(--text); }
.chat-scroll { scroll-behavior: smooth; }
.pulse { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
.tab-active { border-bottom: 2px solid var(--accent) !important; color: var(--accent) !important; }
.progress-fill { transition: width .8s ease; }
.card-hover { transition: all .25s ease; }
.card-hover:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,.3); }
.table-row:hover { background: rgba(79,122,63,.08); }
.avatar-photo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
.clickable-zone { cursor: pointer; transition: all .2s; }
.clickable-zone:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(0,0,0,.2); }
.copy-btn { opacity: 0; transition: opacity .2s; cursor: pointer; font-size: 12px; }
.table-row:hover .copy-btn { opacity: 1; }
.color-picker-wrapper { display: flex; align-items: center; gap: 8px; }
.color-picker-wrapper input[type="color"] { width: 40px; height: 32px; border: none; border-radius: 6px; cursor: pointer; padding: 0; }
.color-picker-wrapper input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
.color-picker-wrapper input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }
.member-card-preview {
width: 595px;
height: 374px;
background: linear-gradient(135deg, #e0e4e8 0%, #f0f0f0 25%, #ffffff 50%, #ffe8e0 75%, #e8d8d0 100%);
border: 2px solid #b0b0b0;
border-radius: 6px;
position: relative;
overflow: hidden;
font-family: 'Georgia', 'Times New Roman', serif;
box-shadow: 0 4px 20px rgba(0,0,0,.15);
}
.member-card-preview .card-header {
display: flex;
align-items: flex-start;
padding: 10px 16px 6px;
gap: 12px;
}
.member-card-preview .card-logo {
width: 60px;
height: 60px;
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
}
.member-card-preview .card-logo img {
width: 100%;
height: 100%;
object-fit: contain;
}
.member-card-preview .card-org-block {
flex: 1;
text-align: left;
padding-top: 2px;
}
.member-card-preview .card-org-name {
font-size: 18px;
font-weight: bold;
color: #c0392b;
line-height: 1.2;
letter-spacing: 0.5px;
}
.member-card-preview .card-org-addr {
font-size: 10px;
color: #4a4a6a;
margin-top: 2px;
font-family: 'Georgia', serif;
}
.member-card-preview .card-org-decret {
font-size: 8px;
color: #777;
font-style: italic;
margin-top: 1px;
}
.member-card-preview .card-type-line {
text-align: center;
padding: 6px 0 4px;
border-bottom: 1px solid #ccc;
margin: 0 16px;
}
.member-card-preview .card-type {
font-size: 17px;
font-style: italic;
color: #2c2c2c;
font-family: 'Georgia', serif;
}
.member-card-preview .card-number {
font-size: 13px;
font-style: normal;
color: #555;
font-weight: normal;
}
.member-card-preview .card-fields {
padding: 6px 16px;
font-family: 'Georgia', serif;
}
.member-card-preview .card-field {
display: flex;
align-items: baseline;
margin-bottom: 5px;
font-size: 12px;
}
.member-card-preview .card-field label {
font-size: 10px;
color: #666;
min-width: 90px;
flex-shrink: 0;
font-family: 'Georgia', serif;
}
.member-card-preview .card-field .value {
font-size: 16px;
font-weight: bold;
color: #1a1a1a;
border-bottom: 1px dotted #999;
flex: 1;
padding: 0 6px;
min-height: 22px;
font-family: 'Georgia', serif;
}
.member-card-preview .card-section {
padding: 2px 16px;
font-family: 'Georgia', serif;
}
.member-card-preview .card-section .section-label {
font-size: 10px;
color: #666;
font-weight: normal;
}
.member-card-preview .card-section .section-value {
font-size: 14px;
font-weight: bold;
color: #1a1a1a;
font-family: 'Georgia', serif;
}
.member-card-preview .card-footer {
display: flex;
justify-content: space-around;
padding: 6px 12px 8px;
margin-top: 4px;
}
.member-card-preview .card-signature {
text-align: center;
flex: 1;
}
.member-card-preview .card-signature .sig-img {
width: 80px;
height: 32px;
margin: 0 auto 2px;
display: flex;
align-items: flex-end;
justify-content: center;
overflow: hidden;
}
.member-card-preview .card-signature .sig-img img {
max-width: 100%;
max-height: 100%;
object-fit: contain;
}
.member-card-preview .card-signature .sig-line {
font-size: 14px;
font-style: italic;
color: #333;
min-height: 20px;
display: flex;
align-items: flex-end;
justify-content: center;
font-family: 'Brush Script MT', 'Segoe Script', cursive;
}
.member-card-preview .card-signature .sig-label {
font-size: 7px;
color: #888;
font-family: 'Georgia', serif;
}
.attendance-sheet {
font-family: 'Georgia', serif;
background: white;
color: black;
}
.attendance-sheet table {
border-collapse: collapse;
width: 100%;
}
.attendance-sheet th, .attendance-sheet td {
border: 1px solid #333;
padding: 6px 10px;
font-size: 12px;
}
.attendance-sheet th {
background: #f0f0f0;
font-weight: bold;
}
.attendance-sheet .sig-col {
width: 150px;
height: 30px;
}
.calendar-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 2px;
}
.calendar-day-header {
text-align: center;
font-weight: 600;
font-size: 12px;
padding: 8px 4px;
color: var(--text-dim);
}
.calendar-day {
min-height: 80px;
padding: 4px;
border: 1px solid var(--border);
border-radius: 4px;
font-size: 11px;
}
.calendar-day.today {
border-color: var(--accent);
background: rgba(79,122,63,.1);
}
.calendar-day.other-month {
opacity: .4;
}
.calendar-day-number {
font-weight: 600;
font-size: 13px;
margin-bottom: 2px;
}
.calendar-event {
font-size: 10px;
padding: 1px 4px;
border-radius: 3px;
margin-bottom: 1px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
@media print {
body * { visibility: hidden; }
.print-area, .print-area * { visibility: visible; }
.print-area { position: absolute; left: 0; top: 0; }
.no-print { display: none !important; }
}
.sig-upload-area {
border: 2px dashed var(--border);
border-radius: 8px;
padding: 12px;
text-align: center;
cursor: pointer;
transition: border-color .2s;
}
.sig-upload-area:hover { border-color: var(--accent); }
.sig-preview {
width: 100px;
height: 36px;
margin: 0 auto;
display: flex;
align-items: center;
justify-content: center;
}
.sig-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
.view-toggle { display: flex; gap: 4px; }
.view-toggle button {
padding: 6px 12px;
border-radius: 6px;
font-size: 13px;
cursor: pointer;
border: 1px solid var(--border);
background: var(--bg-input);
color: var(--text-dim);
transition: all .2s;
}
.view-toggle button.active {
background: var(--accent);
color: white;
border-color: var(--accent);
}
.calendar-print {
font-family: 'Georgia', serif;
background: white;
color: black;
padding: 20px;
}
.calendar-print table {
border-collapse: collapse;
width: 100%;
}
.calendar-print th, .calendar-print td {
border: 1px solid #333;
padding: 4px 8px;
font-size: 12px;
vertical-align: top;
}
.calendar-print th {
background: #f0f0f0;
font-weight: bold;
text-align: center;
}
</style>

    <div style="width:100%;max-width:400px;">
        <div style="background:#1a2a1a;border:1px solid #2d402d;border-radius:20px;padding:40px 32px;text-align:center;">
            <div id="loginLogoContainer" style="width:72px;height:72px;border-radius:16px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#4f7a3f;">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/><path d="M12 22V12"/><path d="M22 7L12 12 2 7"/></svg>
            </div>
            <h1 id="loginAppTitle" style="font-size:26px;font-weight:700;margin-bottom:4px;color:#e0e8d8;">MilAssoc Pro</h1>
            <p style="font-size:14px;margin-bottom:32px;color:#8a9a80;">Gestion d'Association Militaire</p>
            <form id="loginForm" autocomplete="off">
                <div style="text-align:left;margin-bottom:16px;">
                    <label style="display:block;font-size:13px;margin-bottom:6px;color:#8a9a80;">Email</label>
                    <input type="email" id="loginEmail" required placeholder="votre@email.fr" value="admin@milassoc.fr" style="width:100%;border-radius:10px;padding:12px 16px;font-size:14px;outline:none;background:#243524;border:1px solid #2d402d;color:#e0e8d8;">
                </div>

        </div>
    </div>
</div>
