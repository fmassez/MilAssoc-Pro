<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitleMeta">MilAssoc Pro</title>
    <link id="favicon" rel="icon" type="image/png" href="">
    
    <!-- Tailwind CSS (CDN pour développement) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/fira-sans@5.0.0/index.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Fira Sans', 'system-ui', 'sans-serif'] } } }
        }
    </script>
    
    <!-- Styles CSS -->
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/print.css" media="print">
</head>
<body id="appBody">

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;background:linear-gradient(135deg,#1a2a1a,#0f1a0f);">
    <div style="width:100%;max-width:400px;">
        <div style="background:#1a2a1a;border:1px solid #2d402d;border-radius:20px;padding:40px 32px;text-align:center;">
            <div id="loginLogoContainer" style="width:72px;height:72px;border-radius:16px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#4f7a3f;">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/><path d="M12 22V12"/><path d="M22 7L12 12 2 7"/></svg>
            </div>
            <h1 id="loginAppTitle" style="font-size:26px;font-weight:700;margin-bottom:4px;color:#e0e8d8;">MilAssoc Pro</h1>
            <p style="font-size:14px;margin-bottom:32px;color:#8a9a80;">Gestion d'Association Militaire</p>
            <form id="loginForm" autocomplete="off">
                <div style="text-align:left;margin-bottom:16px;">
                    <label style="display:block;font-size:13px;margin-bottom:6px;color:#8a9a80;">Email</label>
                    <input type="email" id="loginEmail" required placeholder="votre@email.fr" value="admin@milassoc.fr" style="width:100%;border-radius:10px;padding:12px 16px;font-size:14px;outline:none;background:#243524;border:1px solid #2d402d;color:#e0e8d8;">
                </div>
                <div style="text-align:left;margin-bottom:20px;">
                    <label style="display:block;font-size:13px;margin-bottom:6px;color:#8a9a80;">Mot de passe</label>
                    <input type="password" id="loginPass" required placeholder="••••••••" value="admin123" style="width:100%;border-radius:10px;padding:12px 16px;font-size:14px;outline:none;background:#243524;border:1px solid #2d402d;color:#e0e8d8;">
                </div>
                <div id="loginError" style="display:none;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#ef4444;text-align:left;"></div>
                <button type="submit" id="loginBtn" style="width:100%;padding:14px;border-radius:10px;font-size:16px;font-weight:600;color:white;background:#4f7a3f;border:none;cursor:pointer;">Se connecter</button>
            </form>
            <button id="resetBtn" style="margin-top:16px;font-size:11px;color:#5a6a50;background:none;border:none;cursor:pointer;text-decoration:underline;">Réinitialiser les données</button>
        </div>
    </div>
</div>

<!-- APP SHELL -->
<div id="appShell" style="display:none;">
    <div id="sidebarOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;" onclick="App.closeSidebar()"></div>
    <aside id="sidebar" style="position:fixed;left:0;top:0;height:100%;width:256px;z-index:50;display:flex;flex-direction:column;transition:transform .3s;background:var(--bg-card);border-right:1px solid var(--border);">
        <div style="padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;">
            <div style="display:flex;align-items:center;gap:12px;">
                <div id="sidebarLogo" style="width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--accent);overflow:hidden;">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/><path d="M12 22V12"/><path d="M22 7L12 12 2 7"/></svg>
                </div>
                <div style="min-width:0;"><h1 style="font-size:18px;font-weight:700;letter-spacing:.5px;color:var(--accent-light);" id="appTitle">MILASSOC</h1><p style="font-size:11px;letter-spacing:1px;color:var(--text-dim);">PRO v5.2</p></div>
            </div>
        </div>
        <nav style="flex:1;overflow-y:auto;padding:12px 8px;" id="sidebarNav"></nav>
        <div style="padding:16px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg-card);">
            <div style="display:flex;align-items:center;gap:12px;">
                <div id="userAvatar" style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;background:var(--accent);color:white;overflow:hidden;">CL</div>
                <div style="flex:1;min-width:0;"><p style="font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" id="userName">Cdt. Lefebvre</p><p style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-dim);" id="userRole">Administrateur</p></div>
                <button onclick="App.handleLogout()" style="padding:6px;border-radius:6px;background:none;border:none;cursor:pointer;color:var(--text-dim);" title="Déconnexion"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
            </div>
        </div>
    </aside>
    <main style="margin-left:256px;min-height:100vh;display:flex;flex-direction:column;" id="mainContent">
        <header style="position:sticky;top:0;z-index:30;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg-dark);border-bottom:1px solid var(--border);">
            <div style="display:flex;align-items:center;gap:12px;">
                <button onclick="App.toggleSidebar()" style="display:none;padding:6px;border-radius:6px;background:none;border:none;cursor:pointer;color:var(--text-dim);" id="menuBtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
                <div id="headerLogo" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--accent);overflow:hidden;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/><path d="M12 22V12"/><path d="M22 7L12 12 2 7"/></svg>
                </div>
                <h2 style="font-size:18px;font-weight:600;color:var(--text);" id="pageTitle">Tableau de Bord</h2>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <div style="position:relative;display:none;" id="searchWrap"><input type="text" placeholder="Rechercher..." style="border-radius:8px;padding:8px 12px 8px 36px;font-size:13px;outline:none;width:200px;background:var(--bg-input);border:1px solid var(--border);color:var(--text);" id="globalSearch"><svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
                <button onclick="App.toggleNotifPanel()" style="position:relative;padding:6px;background:none;border:none;cursor:pointer;color:var(--text-dim);"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span style="position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:50%;background:#ef4444;" class="pulse" id="notifDot"></span></button>
                <button onclick="App.openQuickAction()" style="padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:white;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span id="qaLabel">Action rapide</span></button>
            </div>
        </header>
        <div id="notifPanel" style="position:fixed;right:16px;top:56px;z-index:50;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.3);width:320px;max-height:384px;overflow-y:auto;display:none;background:var(--bg-card);border:1px solid var(--border);">
            <div style="padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg-card);"><h4 style="font-weight:600;color:var(--text);">Notifications</h4><button onclick="App.clearNotifs()" style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;">Tout marquer lu</button></div>
            <div id="notifList"></div>
        </div>
        <div style="flex:1;padding:16px 24px;overflow-y:auto;" id="contentArea"></div>
    </main>
</div>

<!-- Toast & Modals -->
<div id="toast" style="position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.3);font-size:14px;font-weight:500;z-index:200;display:flex;align-items:center;gap:8px;max-width:320px;color:white;background:var(--accent);transform:translateY(100px);opacity:0;transition:all .3s;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="toastMsg"></span>
</div>
<div id="confirmModal" style="position:fixed;inset:0;z-index:150;display:none;">
    <div style="position:absolute;inset:0;background:rgba(0,0,0,.6);" onclick="App.closeModal('confirmModal')"></div>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:12px;border:1px solid var(--border);width:100%;max-width:380px;margin:0 16px;padding:24px;background:var(--bg-card);">
        <div style="text-align:center;">
            <div style="width:56px;height:56px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;background:rgba(239,68,68,.2);"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
            <h3 style="font-size:18px;font-weight:600;margin-bottom:8px;color:var(--text);" id="cfmTitle">Confirmer</h3>
            <p style="font-size:14px;margin-bottom:24px;color:var(--text-dim);" id="cfmMsg"></p>
            <div style="display:flex;gap:12px;justify-content:center;">
                <button onclick="App.closeModal('confirmModal')" style="padding:8px 20px;border-radius:8px;font-size:14px;background:var(--bg-input);color:var(--text);border:none;cursor:pointer;">Annuler</button>
                <button onclick="App.execConfirm()" id="cfmBtn" style="padding:8px 20px;border-radius:8px;font-size:14px;font-weight:600;color:white;background:#c0392b;border:none;cursor:pointer;">Supprimer</button>
            </div>
        </div>
    </div>
</div>
<div id="modalsContainer"></div>

<!-- ⚠️ SCRIPTS EN MODULES ES6 - ORDRE IMPORTANT ⚠️ -->
<script type="module" src="js/config.js"></script>
<script type="module" src="js/utils.js"></script>
<script type="module" src="js/themes.js"></script>
<script type="module" src="js/database.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
